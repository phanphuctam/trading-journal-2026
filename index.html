  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  // Simple client-side password gate. Not real security (anyone can read the
  // source), just a deterrent against casual visitors to the public link.
  function ensureUnlocked() {
    if (localStorage.getItem('__tj_unlocked') === '1') return Promise.resolve();
    // SHA-256 hex of the password; the plaintext never appears in the source.
    const PASS_SHA256 = 'e84d118da19d022baf5dcd37c92fa354ac969001a9218057c6a6dfb50b786e33';
    async function passMatches(v) {
      if (!(window.crypto && crypto.subtle)) return false;
      const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
      return Array.from(new Uint8Array(d)).map(function(b){ return b.toString(16).padStart(2, '0'); }).join('') === PASS_SHA256;
    }
    if (loading) loading.style.display = 'none';
    const gate = document.createElement('div');
    gate.style.cssText = 'position:fixed;inset:0;z-index:10001;display:flex;align-items:center;justify-content:center;background:#070b12;';
    gate.innerHTML = '<form id="__pw_form" style="display:flex;flex-direction:column;gap:12px;width:260px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">' +
      '<div style="color:#e6e6e6;font-size:15px;text-align:center;margin-bottom:4px;">Nhap mat khau de tiep tuc</div>' +
      '<input id="__pw_input" type="password" autocomplete="off" style="padding:10px 12px;border-radius:8px;border:1px solid #2a3340;background:#0e1520;color:#fff;font-size:14px;outline:none;" />' +
      '<button type="submit" style="padding:10px 12px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:14px;cursor:pointer;">Mo khoa</button>' +
      '<div id="__pw_error" style="color:#ff8a80;font-size:13px;text-align:center;min-height:16px;"></div>' +
      '</form>';
    document.body.appendChild(gate);
    const form = gate.querySelector('#__pw_form');
    const input = gate.querySelector('#__pw_input');
    const err = gate.querySelector('#__pw_error');
    input.focus();
    return new Promise(function(resolve) {
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (await passMatches(input.value)) {
          localStorage.setItem('__tj_unlocked', '1');
          gate.remove();
          if (loading) loading.style.display = '';
          resolve();
        } else {
          err.textContent = 'Sai mat khau';
          input.value = '';
          input.focus();
        }
      });
    });
  }
  await ensureUnlocked();

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      cumPL += all; t._as = cap + cumPL;\n      t._contrib = cap ? t._as / cap * 100 : 0;\n    });\n    this._cache = arr;\n    return arr;\n  }\n\n  _stats() {\n    const a = this._computed();\n    let win = 0, loss = 0, gW = 0, gL = 0, totNet = 0, totR = 0, peak = 0, maxDD = 0;\n    let curW = 0, curL = 0, maxWStreak = 0, maxLStreak = 0;\n    a.forEach(t => {\n      totNet += t._all; totR += (+t.r || 0);\n      if (t._all > 0) { win++; gW += t._all; curW++; curL = 0; if (curW > maxWStreak) maxWStreak = curW; }\n      else if (t._all < 0) { loss++; gL += Math.abs(t._all); curL++; curW = 0; if (curL > maxLStreak) maxLStreak = curL; }\n      else { curW = 0; curL = 0; }\n      peak = Math.max(peak, t._as);\n      maxDD = Math.max(maxDD, peak > 0 ? (peak - t._as) / peak * 100 : 0);\n    });\n    const capNow = this._contrib(this._today());\n    const eq = capNow + totNet;\n    peak = Math.max(peak, eq);\n    const wr = (win + loss) ? win / (win + loss) * 100 : 0;\n    const pf = gL ? gW / gL : 0;\n    const n = a.length;\n    const avgR = n ? totR / n : 0;\n    const avgWin = win ? gW / win : 0;\n    const avgLoss = loss ? gL / loss : 0;\n    const expectancy = n ? totNet / n : 0;\n    const curStreak = curW > 0 ? curW : (curL > 0 ? -curL : 0);\n    // ── System quality metrics (Minervini) ──\n    let LG = 0, LL = 0, holdWSum = 0, holdWN = 0, holdLSum = 0, holdLN = 0;\n    let disN = 0, disOK = 0, disSum = 0;\n    let maeWSum = 0, maeWN = 0, mfeLSum = 0, mfeLN = 0, effSum = 0, effN = 0, deepLoss = 0;\n    a.forEach(t => {\n      if (t._all > LG) LG = t._all;\n      if (-t._all > LL) LL = -t._all;\n      const hd = this._holdDays(t);\n      if (hd != null) { if (t._all > 0) { holdWSum += hd; holdWN++; } else if (t._all < 0) { holdLSum += hd; holdLN++; } }\n      if (t.dis != null && t.dis !== '' && !isNaN(+t.dis)) { disN++; disSum += +t.dis; if (+t.dis >= 4) disOK++; }\n      if (t.mae != null && t.mae !== '' && !isNaN(+t.mae) && t._all > 0) { maeWSum += Math.abs(+t.ma k.href = URL.createObjectURL(blob);\n      document.head.appendChild(link);\n    } catch (e) {}\n  }\n\n  _tc() {\n    const dark = this.state.theme === 'dark';\n    return {\n      tick: '#969696', grid: dark ? 'rgba(248,244,240,.08)' : 'rgba(36,31,35,.08)',\n      accent: dark ? '#D1BEFF' : '#7A5AD9',\n      green: dark ? '#BEFFCB' : '#1E8743',\n      red: dark ? '#FF6B6D' : '#F0494C',\n      amber: dark ? '#FFB49B' : '#C05B44',\n      card: dark ? '#241F23' : '#FFFFFF', text2: dark ? '#B8B3B0' : '#484848',\n      line: dark ? '#F8F4F0' : '#352D33',\n      winFill: '#BEFFCB', lossFill: '#FF6B6D', drawFill: '#D1BEFF',\n    };\n  }\n\n  _allSetups() {\n    let custom = [];\n    try { custom = JSON.parse(localStorage.getItem('tj_setups_v1') || '[]') || []; } catch (e) {}\n    const seen = new Set(), out = [];\n    for (const s of [...TJ_SETUPS, ...custom]) { const k = (s || '').trim(); if (k && !seen.has(k)) { seen.add(k); out.push(k); } }\n    return out;\n  }\n\n  addSetup = () => {\n    const tr = this._tr();\n    const name = (prompt(tr.askSetup) || '').trim();\n    if (!name) return;\n    const sel = document.getElementById('f_su');\n    if (this._allSetups().includes(name)) { if (sel) sel.value = name; alert(tr.setupExists); return; }\n    let custom = [];\n    try { custom = JSON.parse(localStorage.getItem('tj_setups_v1') || '[]') || []; } catch (e) {}\n    custom.push(name);\n    localStorage.setItem('tj_setups_v1', JSON.stringify(custom));\n    if (sel) { sel.innerHTML = this._allSetups().map(o => `<option>${o}<\/option>`).join(''); sel.value = name; }\n    this._toast(tr.setupAdded + ' · ' + name);\n  }\n\n  _fillSelects() {\n    const fill = (id, arr) => {\n      const el = document.getElementById(id);\n      if (!el || el.options.length === arr.length) return;\n      el.innerHTML = arr.map(o => `<option>${o}<\/option>`).join('');\n    };\n    fill('f_su', this._allSetups()); fill('f_ex', TJ_EXITS); fill('f_e', TJ_EMOS);\n    const dEl = document.getElemen
